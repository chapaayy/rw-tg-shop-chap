services:
  rw-tg-shop-chap:
    build: .
    container_name: rw-tg-shop-chap
    hostname: rw-tg-shop-chap
    env_file:
      - .env
    ports:
      - '127.0.0.1:8080:8080'
    networks:
      - remnawave-network
    environment:
      - TZ=UTC
    volumes:
      - ./locales:/app/locales
    restart: unless-stopped
    depends_on:
      - rw-tg-shop-chap-db
  rw-tg-shop-chap-db:
    image: postgres:17
    container_name: rw-tg-shop-chap-db
    hostname: rw-tg-shop-chap-db
    env_file:
      - .env
    environment:
      - TZ=UTC
    volumes:
      - rw-tg-shop-chap-db-data:/var/lib/postgresql/data
    networks:
      - remnawave-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
networks:
  remnawave-network: null
volumes:
  rw-tg-shop-chap-db-data:
    name: rw-tg-shop-chap-db-data

